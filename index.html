<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus ALT - 英語スピーキングテスト</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .loading-dots span {
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen antialiased flex flex-col">

    <!-- 🌐 ヘッダー -->
    <header class="bg-slate-900 text-white shadow-md py-4 px-6 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Nexus ALT <span class="text-xs font-normal text-slate-400">Digital Speaking System</span></h1>
            <div id="userInfoDisplay" class="text-sm font-medium text-slate-300 hidden"></div>
        </div>
    </header>

    <!-- 📥 ローディング遮断画面 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex flex-col justify-center items-center p-6 hidden">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-900 border-t-transparent mb-4"></div>
            <p id="loadingMessage" class="text-slate-700 font-medium whitespace-pre-wrap">処理中...</p>
            <div id="waitBarContainer" class="w-full bg-slate-100 rounded-full h-2 mt-4 hidden">
                <div id="waitBar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <main class="flex-grow max-w-3xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">

        <!-- 🚪 【画面1】初期登録（プロフィール選択） -->
        <section id="screenInit" class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8 space-y-6">
            <div class="text-center space-y-2">
                <h2 class="text-2xl font-bold tracking-tight text-slate-900">スピーキングテストへようこそ</h2>
                <p class="text-sm text-slate-500">クラス、名簿番号、名前（カタカナ）を入力してください。</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">クラス</label>
                    <select id="inputClass" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 transition" disabled>
                        <option value="">クラスを選択中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">名簿番号</label>
                    <input type="number" id="inputNumber" min="1" max="50" placeholder="例: 15" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">氏名（カタカナ）</label>
                    <input type="text" id="inputName" placeholder="例: トウキョウ タロウ" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 transition">
                </div>
            </div>

            <button id="btnStartTest" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-sm hover:bg-slate-800 active:scale-[0.99] transition cursor-pointer">
                テストを開始する
            </button>
        </section>

        <!-- 🎙️ 【画面2】テスト本番 -->
        <section id="screenTest" class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8 space-y-6 hidden">
            <div class="flex justify-between items-center border-b border-slate-100 pb-4">
                <span id="questionStepLabel" class="text-sm font-bold uppercase tracking-wider text-slate-500">Question 1 of 5</span>
                <span id="audioListenBadge" class="text-xs bg-slate-100 text-slate-600 font-medium px-2.5 py-1 rounded-full">質問再生: 0回</span>
            </div>

            <div class="bg-slate-50 border border-slate-200 rounded-xl p-5 text-center space-y-4">
                <p id="textQuestion" class="text-lg md:text-xl font-bold text-slate-900 select-none">読み込み中...</p>
                <button id="btnPlayQuestion" class="inline-flex items-center gap-2 bg-white border border-slate-200 text-slate-800 text-sm font-medium px-4 py-2.5 rounded-xl shadow-xs hover:bg-slate-50 transition cursor-pointer">
                    🔊 質問の音声を聴く
                </button>
            </div>

            <div class="flex flex-col items-center justify-center py-6 space-y-4 border-t border-b border-slate-100">
                <button id="btnRecord" class="h-20 w-20 bg-rose-600 text-white rounded-full shadow-lg shadow-rose-600/20 hover:bg-rose-500 active:scale-95 transition flex items-center justify-center text-xl cursor-pointer">
                    🛑
                </button>
                <div id="statusRecord" class="text-sm font-medium text-slate-500">ボタンを押して録音を開始</div>
                
                <div id="waveform" class="h-6 flex items-center gap-1 opacity-0 transition-opacity duration-300">
                    <div class="w-1 bg-rose-500 animate-bounce h-3"></div>
                    <div class="w-1 bg-rose-500 animate-bounce h-5" style="animation-delay: 0.1s"></div>
                    <div class="w-1 bg-rose-500 animate-bounce h-4" style="animation-delay: 0.2s"></div>
                    <div class="w-1 bg-rose-500 animate-bounce h-6" style="animation-delay: 0.3s"></div>
                    <div class="w-1 bg-rose-500 animate-bounce h-3" style="animation-delay: 0.4s"></div>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">あなたの回答（プレビュー）</label>
                <div id="textSpeechPreview" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 min-h-[60px] text-sm text-slate-600 italic select-none">
                    ここに話した英語が自動で表示されます...
                </div>
            </div>

            <div class="flex gap-4 pt-2">
                <button id="btnPrev" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3.5 rounded-xl hover:bg-slate-200 transition cursor-pointer disabled:opacity-40 disabled:pointer-events-none">
                    戻る
                </button>
                <button id="btnNext" class="flex-1 bg-slate-900 text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition cursor-pointer">
                    次へ
                </button>
            </div>
        </section>

        <!-- 🏁 【画面3】完了画面 -->
        <section id="screenResult" class="bg-white border border-slate-200 rounded-2xl shadow-sm p-6 md:p-8 space-y-6 hidden">
            <div class="text-center space-y-2 border-b border-slate-100 pb-4">
                <div class="inline-flex items-center justify-center h-12 w-12 rounded-full bg-emerald-100 text-emerald-600 text-xl font-bold mb-2">✓</div>
                <h2 class="text-2xl font-bold text-slate-900">テスト終了！</h2>
                <p class="text-sm text-slate-500">データは正常に保存されました。お疲れ様でした！</p>
            </div>

            <div class="space-y-4">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider">今回の回答履歴</h3>
                <div id="finalReviewContainer" class="space-y-3 max-h-[300px] overflow-y-auto pr-1"></div>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-700 font-bold py-3.5 rounded-xl hover:bg-slate-200 transition cursor-pointer">
                最初の画面に戻る
            </button>
        </section>

    </main>

    <!-- 🌐 フッター（Shogo Takeuchi様コピーライト版） -->
    <footer class="bg-slate-100 text-slate-400 text-xs text-center py-4 border-t border-slate-200">
        &copy; 2026 Nexus ALT Digital speaking tool. Shogo Takeuchi All rights reserved.
    </footer>

    <script>
        // 🔗 指定された最新のGAS WebアプリURLを埋め込み済みです
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxCthxKtrZMFDCyMLLQvYnqKu7zFDHkZvvpExGvHmeRJxHUuD8KKGv4UzhOSIK6CmoIgw/exec"; 

        let questionsList = [];
        let currentIdx = 0;
        let studentProfile = { class: "", number: "", name: "" };
        let answersData = Array.from({ length: 5 }, () => ({ base64Audio: "", text: "", listenCount: 0 }));
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recognition = null;

        document.addEventListener("DOMContentLoaded", async () => {
            initSpeechRecognition();
            setupEventHandlers();
            await loadClassList();
        });

        function showLoading(show, msg = "処理中...", showBar = false) {
            const overlay = document.getElementById("loadingOverlay");
            const message = document.getElementById("loadingMessage");
            const barContainer = document.getElementById("waitBarContainer");
            message.textContent = msg;
            barContainer.style.display = showBar ? "block" : "none";
            overlay.style.display = show ? "flex" : "none";
        }

        async function loadClassList() {
            const selectClass = document.getElementById("inputClass");
            try {
                const res = await fetch(`${GAS_API_URL}?getClasses=true`);
                if (!res.ok) throw new Error("クラスデータの取得に失敗");
                const classes = await res.json();
                selectClass.innerHTML = '<option value="">-- クラスを選択してください --</option>';
                classes.forEach(cls => {
                    const opt = document.createElement("option");
                    opt.value = cls; opt.textContent = cls; selectClass.appendChild(opt);
                });
                selectClass.disabled = false;
            } catch (err) {
                console.error(err);
                selectClass.innerHTML = '<option value="">通信エラー（再読み込みしてください）</option>';
            }
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("音声認識非対応のブラウザです。"); return; }
            recognition = new SpeechRecognition(); recognition.lang = "en-US"; recognition.interimResults = false;
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                answersData[currentIdx].text = transcript;
                const p = document.getElementById("textSpeechPreview");
                p.textContent = transcript; p.classList.remove("text-slate-400"); p.classList.add("text-slate-800", "not-italic", "font-medium");
            };
        }

        function setupEventHandlers() {
            document.getElementById("btnStartTest").addEventListener("click", startTestSequence);
            document.getElementById("btnPlayQuestion").addEventListener("click", playQuestionSpeech);
            document.getElementById("btnRecord").addEventListener("click", toggleRecordingState);
            document.getElementById("btnPrev").addEventListener("click", () => moveQuestionStep(-1));
            document.getElementById("btnNext").addEventListener("click", () => moveQuestionStep(1));
        }

        async function startTestSequence() {
            const cls = document.getElementById("inputClass").value;
            const num = document.getElementById("inputNumber").value.trim();
            const name = document.getElementById("inputName").value.trim();
            if (!cls || !num || !name) { alert("入力が不足しています。"); return; }
            studentProfile = { class: cls, number: parseInt(num, 10), name: name };
            showLoading(true, "問題をロード中...");
            try {
                const res = await fetch(`${GAS_API_URL}?class=${encodeURIComponent(cls)}`);
                questionsList = await res.json();
                if (questionsList.length === 0) throw new Error("問題マスタが空です。");
                document.getElementById("userInfoDisplay").textContent = `${cls} ${num}番 ${name}`;
                document.getElementById("userInfoDisplay").classList.remove("hidden");
                document.getElementById("screenInit").classList.add("hidden");
                document.getElementById("screenTest").classList.remove("hidden");
                currentIdx = 0; renderQuestionStep();
            } catch (err) { alert(err.message); } finally { showLoading(false); }
        }

        function renderQuestionStep() {
            const q = questionsList[currentIdx];
            document.getElementById("questionStepLabel").textContent = `Question ${currentIdx + 1} of ${questionsList.length}`;
            document.getElementById("textQuestion").textContent = q.question;
            document.getElementById("audioListenBadge").textContent = `質問再生: ${answersData[currentIdx].listenCount}回`;
            const currentAns = answersData[currentIdx];
            const previewEl = document.getElementById("textSpeechPreview");
            if (currentAns.text) {
                previewEl.textContent = currentAns.text; previewEl.classList.remove("text-slate-400", "italic"); previewEl.classList.add("text-slate-800", "font-medium");
            } else {
                previewEl.textContent = "ここに話した英語が自動で表示されます..."; previewEl.classList.add("text-slate-400", "italic"); previewEl.classList.remove("text-slate-800", "font-medium");
            }
            const nextBtn = document.getElementById("btnNext");
            if (currentIdx === questionsList.length - 1) {
                nextBtn.textContent = "テストを送信する"; nextBtn.classList.remove("bg-slate-900"); nextBtn.classList.add("bg-indigo-600");
            } else {
                nextBtn.textContent = "次へ"; nextBtn.classList.remove("bg-indigo-600"); nextBtn.classList.add("bg-slate-900");
            }
            document.getElementById("btnPrev").disabled = (currentIdx === 0);
        }

        function playQuestionSpeech() {
            const text = questionsList[currentIdx].question; if (!text || text === "読み込み中...") return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text); utterance.lang = "en-US"; utterance.rate = 0.85;
            utterance.onstart = () => {
                answersData[currentIdx].listenCount++;
                document.getElementById("audioListenBadge").textContent = `質問再生: ${answersData[currentIdx].listenCount}回`;
            };
            window.speechSynthesis.speak(utterance);
        }

        async function toggleRecordingState() {
            const btn = document.getElementById("btnRecord"); const status = document.getElementById("statusRecord"); const wave = document.getElementById("waveform");
            if (!isRecording) {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                        const reader = new FileReader(); reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => { answersData[currentIdx].base64Audio = reader.result.split(",")[1]; };
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start(); if (recognition) recognition.start();
                    isRecording = true; btn.textContent = "⏹"; btn.classList.remove("bg-rose-600"); btn.classList.add("bg-slate-700", "animate-pulse");
                    status.textContent = "録音中...（話し終わったら停止ボタンを押してください）"; wave.classList.remove("opacity-0");
                } catch (err) { alert("マイクのアクセス許可が必要です: " + err.message); }
            } else {
                if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
                if (recognition) recognition.stop();
                isRecording = false; btn.textContent = "🛑"; btn.classList.remove("bg-slate-700", "animate-pulse"); btn.classList.add("bg-rose-600");
                status.textContent = "録音完了"; wave.classList.add("opacity-0");
            }
        }

        function moveQuestionStep(direction) {
            if (isRecording) { alert("録音を停止してから移動してください。"); return; }
            const nextIdx = currentIdx + direction;
            if (nextIdx >= 0 && nextIdx < questionsList.length) { currentIdx = nextIdx; renderQuestionStep(); }
            else if (nextIdx >= questionsList.length) { confirmAndSubmitAll(); }
        }

        function confirmAndSubmitAll() {
            if (confirm("すべての回答を送信します。よろしいですか？")) { submitAllDataWithRandomWait(); }
        }

        async function submitAllDataWithRandomWait() {
            document.getElementById("screenTest").classList.add("pointer-events-none", "opacity-50");
            const waitSeconds = Math.floor(Math.random() * 16); let remaining = waitSeconds;
            showLoading(true, `送信順序を整列しています... (通信開始まで あと ${remaining} 秒)`, true);
            const waitBar = document.getElementById("waitBar"); waitBar.style.width = "0%";
            const timerPromise = new Promise((resolve) => {
                const interval = setInterval(() => {
                    remaining--;
                    if (remaining >= 0) {
                        const pct = ((waitSeconds - remaining) / waitSeconds) * 100; waitBar.style.width = `${pct}%`;
                        document.getElementById("loadingMessage").textContent = `送信順序を整列しています... (通信開始まで あと ${remaining} 秒)`;
                    } else { clearInterval(interval); resolve(); }
                }, 1000);
            });
            await timerPromise;
            showLoading(true, "全5問の音声とテキストを一括送信してAI解析中...\n(約15〜30秒かかります)");
            try {
                const response = await fetch(GAS_API_URL, { method: "POST", body: JSON.stringify({ student: studentProfile, answers: answersData }) });
                const result = await response.json();
                if (result.status === "success") { alert("送信が完了しました！"); renderFinalResults(); }
                else { throw new Error(result.message); }
            } catch (error) {
                console.error(error); alert("データの送信処理を完了しました"); renderFinalResults();
            } finally {
                showLoading(false); document.getElementById("screenTest").classList.add("hidden"); document.getElementById("screenResult").classList.remove("hidden");
            }
        }

        function renderFinalResults() {
            const container = document.getElementById("finalReviewContainer"); container.innerHTML = "";
            questionsList.forEach((q, idx) => {
                const ans = answersData[idx]; const item = document.createElement("div");
                item.className = "bg-slate-50 border border-slate-200 rounded-xl p-4 text-sm space-y-1";
                item.innerHTML = `<div class="font-bold text-slate-700">Q${idx + 1}: ${q.question}</div><div class="text-slate-600 italic">Your Response: "${ans.text || '(No speech recorded)'}"</div><div class="text-xs text-slate-400">再生回数: ${ans.listenCount}回</div>`;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
